<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Summary</title>
    <style>
        body { margin: 0; font-family: 'Geist', sans-serif; background-color: #BCC3C8; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background-color: #172026; color: #F8F9FA; padding: 6px 15px; font-size: 14px; display: flex; justify-content: space-between; font-weight: bold; }
        .main-container { display: flex; flex: 1; height: 100%; overflow: hidden; }
        .content-area { flex: 1; border-right: 2px solid #a3c2e0; display: flex; flex-direction: column; background: #fffcf0; }
        .inner-header { background: #fdcf61; padding: 4px; font-size: 14px; font-weight: bold; border-bottom: 2px solid #8baabd; text-align: center;}
        .vch-top-bar { display: flex; justify-content: space-between; padding: 8px 15px; background: #fffcf0; border-bottom: 1px solid #c0c0c0; font-size: 13px; font-weight: bold; color: #2E5085; }
        .main-grid { flex: 1; border-collapse: collapse; margin-top: 0; width: 100%;}
        .main-grid th { border-bottom: 1px solid #2E5085; border-top: 1px solid #2E5085; border-bottom: 1px solid #2E5085; border-top: 1px solid #2E5085; padding: 8px; font-size: 13px; text-align: left; color: #2E5085; background: #fdfdfd; font-weight: normal;}
        .main-grid td { border-bottom: 1px solid #eee; padding: 6px 8px; font-size: 13px; color: #333;}
        .main-grid tr:hover { background-color: #F5B935; cursor: pointer; }
        
        .right-panel { width: 180px; background-color: #BCC3C8; display: flex; flex-direction: column; padding-top: 0;}
        .right-panel .btn-shortcut { background: transparent; border: none; border-bottom: 1px solid #2E5085; padding: 8px 10px; text-align: left; font-size: 12px; cursor: pointer; color: #172026; display: flex; justify-content: space-between; }
        .right-panel .btn-shortcut:hover { background-color: #F5B935; color: #F8F9FA; }
        .shortcut-key { color: #2E5085; font-weight: bold; }
        .btn-shortcut:hover .shortcut-key { color: #F8F9FA; }
        
        .footer-panel { background-color: #172026; color: #F8F9FA; font-size: 12px; padding: 5px 15px; text-align: center;}
        .back-btn { background: none; border: 1px solid white; color: #F8F9FA; cursor: pointer; padding: 2px 8px; border-radius: 0px;}
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-sans/style.css">

</head>
<body>
    <div class="header">
        <div>TallyPrime - Stock Summary</div>
        <button class="back-btn" onclick="window.location.href='/'">ESC: Quit</button>
    </div>
    <div class="main-container">
        <div class="content-area">
            <div class="inner-header">Stock Summary</div>
            <div class="vch-top-bar">
                <div style="color: #172026;">Company Base Name</div>
                <div style="text-align: right;">As 31-Mar-24</div>
            </div>
            <table class="main-grid">
                <thead>
                    <tr>
                        <th style="width: 50%;">Particulars</th>
                        <th style="width: 15%; text-align: right;">Quantity</th>
                        <th style="width: 15%; text-align: right;">Rate</th>
                        <th style="width: 20%; text-align: right;">Value</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="font-weight: bold;">Electronic Items</td>
                        <td style="text-align: right;">150 pcs</td>
                        <td style="text-align: right;"></td>
                        <td style="text-align: right; font-weight: bold;">1,50,000.00</td>
                    </tr>
                    <tr>
                        <td style="padding-left: 20px;">Dell Laptops</td>
                        <td style="text-align: right;">50 pcs</td>
                        <td style="text-align: right;">2,000.00</td>
                        <td style="text-align: right;">1,00,000.00</td>
                    </tr>
                    <tr>
                        <td style="padding-left: 20px;">Lenovo Desktops</td>
                        <td style="text-align: right;">100 pcs</td>
                        <td style="text-align: right;">500.00</td>
                        <td style="text-align: right;">50,000.00</td>
                    </tr>
                    <tr style="border-top: 2px solid #555;">
                        <td style="font-weight: bold; text-align: right;">Grand Total</td>
                        <td style="text-align: right; font-weight: bold;">150 pcs</td>
                        <td></td>
                        <td style="text-align: right; font-weight: bold;">1,50,000.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="right-panel">
            <button class="btn-shortcut"><span>Detailed</span> <span class="shortcut-key">Alt+F5</span></button>
            <button class="btn-shortcut"><span>Period</span> <span class="shortcut-key">F2</span></button>
            <button class="btn-shortcut"><span>Company</span> <span class="shortcut-key">F3</span></button>
        </div>
    </div>
    <div class="footer-panel">Tally Solutions Pvt. Ltd., 1988-2023</div>
</body>
</html>
