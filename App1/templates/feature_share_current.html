{% extends 'base.html' %}
{% block body %}
{% load static %}
<style>
    .sc-wrapper{display:flex;flex-direction:column;height:100%;background:#BCC3C8}.sc-header{background:#F8F9FA;color:#172026;display:flex;justify-content:space-between;align-items:center;padding:2px 12px;font-size:13px;font-weight:700;border-bottom:1px solid #2E5085}.sc-header .close-btn{cursor:pointer;padding:0 4px;font-size:16px;color:#172026;text-decoration:none}.sc-header .close-btn:hover{color:#F5B935}.sc-body{display:flex;flex:1;overflow:hidden}.sc-main{background:#F8F9FA;flex:1;display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid #2E5085}.sc-form{padding:12px 16px}.sc-row{display:flex;align-items:center;margin-bottom:6px;font-family:'JetBrains Mono',monospace;font-size:11px}.sc-label{width:180px;color:#172026}.sc-colon{padding:0 8px;color:#2E5085}.sc-input{flex:1;background:transparent;border:none;border-bottom:1px solid #BCC3C8;padding:2px 4px;color:#172026;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none}.sc-input:focus{background:#FEFBEA;border-bottom:1px solid #F5B935}.sc-divider{border:none;border-top:1px solid #2E5085;margin:8px 0}.sc-section-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:800;color:#2E5085;letter-spacing:.5px;padding:8px 16px 4px;border-bottom:1px solid #2E5085}
    .sc-middle{flex:1;background:#BCC3C8}.sc-sidebar{width:160px;background:#BCC3C8;border-left:1px solid #2E5085;display:flex;flex-direction:column;padding:4px;gap:4px}
    .sb-btn{background:#F8F9FA;border:1px solid #2E5085;color:#172026;font-family:'Geist',sans-serif;font-size:11px;text-align:left;padding:4px 8px;cursor:pointer;display:flex;text-decoration:none}.sb-key{font-family:'JetBrains Mono',monospace;font-weight:700;color:#2E5085;width:32px}.sb-btn:hover{background:#F5B935}.sb-btn.disabled{color:#BCC3C8;cursor:default}.sb-btn.disabled .sb-key{color:#BCC3C8}.sb-btn.disabled:hover{background:#F8F9FA}
    .sc-footer{background:#F8F9FA;border-top:1px solid #2E5085;display:flex;align-items:center;padding:2px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;gap:24px;height:24px}.sc-footer a{color:#172026;text-decoration:none}.sc-footer .fk{color:#2E5085;font-weight:700}
    .sc-action-btn{background:#2E5085;color:#F8F9FA;border:1px solid #172026;padding:4px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;margin-top:8px}.sc-action-btn:hover{background:#F5B935;color:#172026}
    .sc-status{padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;border-top:1px solid #2E5085;color:#2E5085}
    .sc-textarea{width:100%;height:80px;background:#F8F9FA;border:1px solid #BCC3C8;padding:4px 8px;color:#172026;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;resize:none}.sc-textarea:focus{border-color:#F5B935;background:#FEFBEA}
</style>

<div class="sc-wrapper">
    <div class="sc-header"><span>Share Current (Email)</span><a href="javascript:history.go(-1);" class="close-btn">&times;</a></div>
    <div class="sc-body">
        <div class="sc-main">
            <div class="sc-section-title">EMAIL CURRENT REPORT</div>
            <div class="sc-form">
                <div class="sc-row"><div class="sc-label">Email To</div><div class="sc-colon">:</div><input type="email" class="sc-input" placeholder="recipient@example.com"></div>
                <div class="sc-row"><div class="sc-label">CC</div><div class="sc-colon">:</div><input type="email" class="sc-input" placeholder="cc@example.com (optional)"></div>
                <div class="sc-row"><div class="sc-label">Subject</div><div class="sc-colon">:</div><input type="text" class="sc-input" value="Balance Sheet — Sample Company Ltd — Mar 2026"></div>
                <div class="sc-row"><div class="sc-label">Attachment Format</div><div class="sc-colon">:</div>
                    <select class="sc-input" style="cursor:pointer;background:#F8F9FA;"><option value="pdf">PDF</option><option value="excel">Excel</option><option value="xml">XML</option></select></div>
            </div>
            <div class="sc-section-title">MESSAGE</div>
            <div class="sc-form">
                <textarea class="sc-textarea">Dear Sir/Madam,

Please find attached the Balance Sheet for Sample Company Ltd as at 31-Mar-2026.

Regards,
Accounts Department</textarea>
                <button class="sc-action-btn" onclick="document.getElementById('scSt').innerHTML='&#9679; Email sent successfully';">Send Email</button>
            </div>
            <div class="sc-status" id="scSt">&#9679; Compose your email and click Send</div>
        </div>
        <div class="sc-middle"></div>
        <div class="sc-sidebar">
            <a href="javascript:history.go(-1);" class="sb-btn"><span class="sb-key">Esc</span><span>Back</span></a>
            <div class="sb-btn disabled"><span class="sb-key">F2</span></div><div class="sb-btn disabled"><span class="sb-key">F3</span></div><div class="sb-btn disabled"><span class="sb-key">F4</span></div><div class="sb-btn disabled"><span class="sb-key">F5</span></div><div class="sb-btn disabled"><span class="sb-key">F6</span></div><div class="sb-btn disabled"><span class="sb-key">F7</span></div><div class="sb-btn disabled"><span class="sb-key">F8</span></div><div class="sb-btn disabled"><span class="sb-key">F9</span></div><div class="sb-btn disabled"><span class="sb-key">F10</span></div>
            <div style="flex:1;"></div>
            <div class="sb-btn"><span class="sb-key">Enter</span><span>Send</span></div>
        </div>
    </div>
    <div class="sc-footer"><a href="javascript:history.go(-1);"><span class="fk">Q:</span> Quit</a><a href="/home"><span class="fk">Esc:</span> Dashboard</a></div>
</div>
<script>document.addEventListener('keydown',function(e){if(e.key==='Escape')history.go(-1);});</script>
{% endblock %}
