{% extends 'base.html' %}
{% block body %}
    {% load static %}
<style>
    *{
        padding: 0;
        margin: 0;
        font-family: 'Geist', sans-serif;
        box-sizing:border-box;
    }
   
    table,th,td
{
border-collapse: collapse;
text-align: center;
}
table
{
width: 100%;

}


th
{

border-bottom: 1px solid #2E5085; border-top: 1px solid #2E5085;
font-size: 12px;
padding: 6px;
color: #2E5085;
border-bottom: 1px solid #2E5085; border-top: 1px solid #2E5085;

}

td
{
padding: 8px;
font-size: 13px;

}
.lists{
display: flex;
align-items: center;
justify-content: center;
}
.titles{
width: 100%;
text-align: center;

padding: 10px 5px 5px;
color: #2E5085;
font-size: 13px;

}

.btns{
color: #172026;
text-decoration: none;



}
.btns_prnt{
    width: 100%;
    text-align: start;
    background-color: transparent;
    border: none;
    height: 24px;
    display: flex;
    align-items: center;
}
.btns_prnt h5, .btns_prnt h6 {
    margin: 0;
    padding: 0 16px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: inherit;
}
.btns_prnt:hover{
    background-color: #F5B935 !important;
    color: #172026 !important;
}
.btn-util {
    border-radius: 0 !important;
    font-family: 'Geist', sans-serif !important;
    font-size: 11px !important;
    font-weight: bold !important;
    cursor: pointer !important;
    transition: all 0.1s ease !important;
}
.btn-util-primary {
    background-color: #2E5085 !important;
    color: #F8F9FA !important;
    border: none !important;
}
.btn-util-primary:hover {
    background-color: #F5B935 !important;
    color: #172026 !important;
}
.btn-util-sec {
    background-color: #BCC3C8 !important;
    color: #172026 !important;
    border: 1px solid #2E5085 !important;
}
.btn-util-sec:hover {
    background-color: #F8F9FA !important;
    border-color: #F5B935 !important;
}

.btns_prnt2{
width: 100%;
text-align: start;
background-color: #F8F9FA;
border: none;
padding: 3px;
text-decoration: none;

}
.btns_prnt2:hover{
background-color: #F5B935;
color: #F8F9FA;
}
.btns_2{
width: 100%;
text-align: end;
background-color: #F8F9FA;
border: none;
padding: 6px;


}
.btns_2:hover{
background-color: #F5B935;
color: #172026;
}


.bg-model {
background-color: #F8F9FA;


width: 100%;
height: 100%;
position: absolute;
top: 0;

display:none;
justify-content: center;
align-items: center;
}
.titles2{
width: 100%;
text-align: start;

padding: 10px 5px 5px;
color: #172026;
font-size: 13px;

}
.close {
position: absolute;
top: 0;
right: 10px;
font-size: 30px;
color: #F8F9FA;
transform: rotate(45deg);
cursor: pointer;

}
.close:hover {
    color: #F5B935;
}
.moreText {
display: none;
}
.text.show-more .moreText {
display:inline;
text-decoration: none;
}
.nodec{
text-decoration: none;
}
</style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-sans/style.css">
</head>
<body>
    <div style="height: 100%; display: flex; flex-direction: column;">
        <h6 style="color: #172026; background-color: #F8F9FA; padding: 4px 12px; margin: 0; border-bottom: 1px solid #2E5085; font-size: 12px; font-weight: bold; font-family: 'Geist', sans-serif;">Alter</h6>
    <div style="display:flex; flex: 1; overflow: hidden; background-color: #BCC3C8;">
    
    <!-- Left List Panel -->
    <div style="border-right: 1px solid #2E5085; width:55%; height: 100%; background-color: #F8F9FA; overflow-y: auto;">
       
        <div style="display:flex; padding: 12px 16px; border-bottom: 1px solid #BCC3C8; align-items: center; justify-content: space-between;">
        
        <div style="text-align: start;">
          <h5 style="color: #172026; font-size: 16px; height: 3%;">List Of Voucher Types</h5>
      </div>
      <div style="text-align: end;">
        <h5 style="color: #172026; padding:5px;font-size: 16px;">For 1-Apr-22</h5>
        <a href="load_create_vouchertyp" style="text-decoration: none;">
            <button class="btn-util btn-util-primary" style="padding: 4px 12px; margin-bottom: 4px; width: 80px; text-align: center;">Create</button>
        </a><br>
        <a href="{% url 'home' %}" style="text-decoration: none;">
            <button class="btn-util btn-util-sec" style="padding: 3px 11px; width: 80px; text-align: center;">Back</button>
        </a>
      </div>
      </div>

  {% for i in vch %}
  <a href="{% url 'update_voucher' i.id  %}"><button class="btns_prnt" id="create"><h5>{{ i.voucher_name }}</h5></button></a>
  {% endfor %}

    </div>
    
    <!-- Right Gateway Panel -->
    <div style="width:45%; height: 100%; padding: 12px; display: flex; justify-content: center; align-items: flex-start;">
        <div style="width: 80%; background-color: #F8F9FA; border: 1px solid #2E5085; display: flex; flex-direction: column; overflow: hidden; box-shadow: 4px 4px 0 rgba(46,80,133,0.1);">
           <h5 style="background-color: #2E5085; color: #F8F9FA; margin: 0; text-align: center; padding: 4px; font-size: 12px; font-weight: bold; font-family: 'Geist', sans-serif;">Gateway of Tally</h5>
           <div style="flex: 1; overflow-y: auto; padding-bottom: 12px;">
           
           <p class="titles" style="text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; border-bottom: 1px solid #BCC3C8; margin: 8px 12px 4px; padding: 0 0 4px 0; color: #2E5085;">MASTERS</p>
           <button class="btns_prnt" id="create" onclick="window.location.href='load_create_vouchertyp';"><h5>Create</h5></button>
           <a href="{% url 'ledger' %}" class="nodec"><button class="btns_prnt"><h5>Alter</h5></button></a>
           <a href="{% url 'group' %}" class="nodec"><button class="btns_prnt"><h5>Chart of Accounts</h5></button></a>
           
           <p class="titles" style="text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; border-bottom: 1px solid #BCC3C8; margin: 8px 12px 4px; padding: 0 0 4px 0; color: #2E5085;">TRANSACTIONS</p>
           <a href="{% url 'accounting_vouchers' %}" class="nodec"><button class="btns_prnt"><h5>Vouchers</h5></button></a>
           <a href="{% url 'daybook' %}" class="nodec"><button class="btns_prnt"><h5>Day Book</h5></button></a>
           
           <p class="titles" style="text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; border-bottom: 1px solid #BCC3C8; margin: 8px 12px 4px; padding: 0 0 4px 0; color: #2E5085;">UTILITIES</p>
           <a href="{% url 'banking_stub' %}" class="nodec"><button class="btns_prnt"><h5>Banking</h5></button></a>
           
           <p class="titles" style="text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; border-bottom: 1px solid #BCC3C8; margin: 8px 12px 4px; padding: 0 0 4px 0; color: #2E5085;">REPORTS</p>
           <a href="{% url 'balancesheet' %}" class="nodec"><button class="btns_prnt"><h5>Balance Sheet</h5></button></a>
           <a href="{% url 'profitloss' %}" class="nodec"><button class="btns_prnt"><h5>Profit & Loss A/C</h5></button></a>
           <a href="{% url 'stocksummary' %}" class="nodec"><button class="btns_prnt"><h5>Stock Summary</h5></button></a>
           <a href="{% url 'ratioanalysis' %}" class="nodec"><button class="btns_prnt"><h5>Ratio Analysis</h5></button></a>
           <a href="{% url 'displaymorereports' %}" class="nodec"><button class="btns_prnt"><h5>Display More Reports</h5></button></a>
           
           <div style="height: 12px;"></div>
           <a href="{% url 'home' %}" class="nodec"><button class="btns_prnt"><h5>Quit</h5></button></a>
        </div>
        </div>
    </div>
    
    </div> <!-- closes display:flex row -->
{% endblock %}
