<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accounting Voucher Creation</title>
    <style>
        body { margin: 0; font-family: 'Geist', sans-serif; background-color: #BCC3C8; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background-color: #172026; color: #F8F9FA; padding: 6px 15px; font-size: 14px; display: flex; justify-content: space-between; font-weight: bold; }
        .main-container { display: flex; flex: 1; height: 100%; overflow: hidden; }
        .content-area { flex: 1; border-right: 2px solid #a3c2e0; display: flex; flex-direction: column; background: #fffcf0; }
        .inner-header { background: #fdcf61; padding: 4px; font-size: 14px; font-weight: bold; border-bottom: 2px solid #8baabd; text-align: center;}
        .vch-top-bar { display: flex; justify-content: space-between; padding: 8px 15px; background: #fffcf0; border-bottom: 1px solid #c0c0c0; font-size: 13px; font-weight: bold; color: #2E5085; }
        .vch-grid { flex: 1; border-collapse: collapse; margin-top: 5px; }
        .vch-grid th { border-bottom: 1px solid #777; padding: 5px; font-size: 13px; text-align: left; color: #555; }
        .vch-grid td { border-bottom: 1px solid #eee; border-left: 1px solid #eee; padding: 5px; font-size: 13px; vertical-align: top;}
        .vch-grid input { border: none; background: transparent; width: 100%; outline: none; font-size: 14px; }
        
        .right-panel { width: 180px; background-color: #BCC3C8; display: flex; flex-direction: column; padding-top: 0;}
        .right-panel .btn-shortcut { background: transparent; border: none; border-bottom: 1px solid #2E5085; padding: 8px 10px; text-align: left; font-size: 12px; cursor: pointer; color: #172026; display: flex; justify-content: space-between; }
        .right-panel .btn-shortcut:hover { background-color: #F5B935; color: #F8F9FA; }
        .shortcut-key { color: #2E5085; font-weight: bold; }
        .btn-shortcut:hover .shortcut-key { color: #F8F9FA; }
        
        .footer-panel { background-color: #172026; color: #F8F9FA; font-size: 12px; padding: 5px 15px; text-align: center;}
        .bottom-calculator { border-top: 2px solid #8baabd; height: 100px; background: #fafafa; padding: 5px; font-family: monospace; }
        .back-btn { background: none; border: 1px solid white; color: #F8F9FA; cursor: pointer; padding: 2px 8px; border-radius: 0px;}
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-sans/style.css">

</head>
<body>
    <div class="header">
        <div>TallyPrime - Accounting Voucher Creation</div>
        <button class="back-btn" onclick="window.location.href='/'">ESC: Quit</button>
    </div>
    <div class="main-container">
        <div class="content-area">
            <div class="inner-header">Accounting Voucher Creation</div>
            <form action="{% url 'accounting_vouchers' %}" method="post" id="voucherForm" style="display:flex; flex-direction:column; height:100%;">
                {% csrf_token %}
                <div class="vch-top-bar">
                    <div>
                        <select name="vch_type" style="background:transparent; font-weight:bold; border:none; outline:none; font-size:13px; color:#172026;">
                            <option value="Payment">Payment</option>
                            <option value="Receipt">Receipt</option>
                            <option value="Journal">Journal</option>
                            <option value="Contra">Contra</option>
                            <option value="Sales">Sales</option>
                            <option value="Purchase">Purchase</option>
                        </select>
                        <span style="margin-left: 10px; color: #172026;">No. Auto</span>
                    </div>
                    <div style="text-align: right;">
                        <input type="date" name="vch_date" value="2023-04-01" style="background:transparent; border:none; outline:none; text-align:right; font-weight:normal;">
                    </div>
                </div>
                
                {% if messages %}
                    {% for message in messages %}
                        <div style="background-color: #d4edda; color: #155724; padding: 10px; text-align:center; border-bottom:1px solid #c3e6cb;">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <table class="vch-grid">
                    <thead>
                        <tr>
                            <th style="width: 5%;">Dr/Cr</th>
                            <th style="width: 65%;">Particulars</th>
                            <th style="width: 15%;">Debit</th>
                            <th style="width: 15%;">Credit</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Dr</td>
                            <td>
                                <select name="dr_ledger" style="width: 100%; border: none; background: transparent; outline: none; font-size: 14px;">
                                    <option value="" disabled selected>Select Ledger...</option>
                                    {% for ledger in ledgers %}
                                        <option value="{{ ledger.id }}">{{ ledger.ledger_name }}</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td><input type="number" step="0.01" name="dr_amount" style="text-align: right;" value="0"></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td>Cr</td>
                            <td>
                                <select name="cr_ledger" style="width: 100%; border: none; background: transparent; outline: none; font-size: 14px;">
                                    <option value="" disabled selected>Select Ledger...</option>
                                    {% for ledger in ledgers %}
                                        <option value="{{ ledger.id }}">{{ ledger.ledger_name }}</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td></td>
                            <td><input type="number" step="0.01" name="cr_amount" style="text-align: right;" value="0"></td>
                        </tr>
                    </tbody>
                </table>
                <div style="padding: 10px;">
                    <label style="font-size: 12px; font-weight: bold;">Narration:</label><br>
                    <input type="text" name="narration" style="width: 100%; border: none; border-bottom: 1px solid #aaa; background: transparent; outline: none;">
                </div>
                <div style="padding: 10px; text-align: center;">
                    <button type="submit" style="background:#2E5085; color:#F8F9FA; border:none; padding:8px 30px; cursor:pointer; font-weight:bold; font-size:14px;">Save Voucher (Ctrl+A)</button>
                </div>
            </form>
        </div>
        <div class="right-panel">
            <button class="btn-shortcut"><span>Date</span> <span class="shortcut-key">F2</span></button>
            <button class="btn-shortcut"><span>Company</span> <span class="shortcut-key">F3</span></button>
            <button class="btn-shortcut"><span>Contra</span> <span class="shortcut-key">F4</span></button>
            <button class="btn-shortcut" style="background:#b3d4ff;"><span>Payment</span> <span class="shortcut-key">F5</span></button>
            <button class="btn-shortcut"><span>Receipt</span> <span class="shortcut-key">F6</span></button>
            <button class="btn-shortcut"><span>Journal</span> <span class="shortcut-key">F7</span></button>
            <button class="btn-shortcut"><span>Sales</span> <span class="shortcut-key">F8</span></button>
            <button class="btn-shortcut"><span>Purchase</span> <span class="shortcut-key">F9</span></button>
            <button class="btn-shortcut"><span>Other Vouchers</span> <span class="shortcut-key">F10</span></button>
        </div>
    </div>
    <div class="footer-panel">Tally Solutions Pvt. Ltd., 1988-2023</div>
</body>
</html>
