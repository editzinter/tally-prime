{% extends 'base.html' %}
{% block body %}
{% load static %}
<style>
    .dp-wrapper{display:flex;flex-direction:column;height:100%;background:#BCC3C8}.dp-header{background:#F8F9FA;color:#172026;display:flex;justify-content:space-between;align-items:center;padding:2px 12px;font-size:13px;font-weight:700;border-bottom:1px solid #2E5085}.dp-header .close-btn{cursor:pointer;padding:0 4px;font-size:16px;color:#172026;text-decoration:none}.dp-header .close-btn:hover{color:#F5B935}.dp-body{display:flex;flex:1;overflow:hidden}.dp-main{background:#F8F9FA;flex:1;display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid #2E5085}.dp-form{padding:12px 16px}.dp-row{display:flex;align-items:center;margin-bottom:6px;font-family:'JetBrains Mono',monospace;font-size:11px}.dp-label{width:200px;color:#172026}.dp-colon{padding:0 8px;color:#2E5085}.dp-input{flex:1;background:transparent;border:none;border-bottom:1px solid #BCC3C8;padding:2px 4px;color:#172026;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none}.dp-input:focus{background:#FEFBEA;border-bottom:1px solid #F5B935}.dp-section-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:800;color:#2E5085;letter-spacing:.5px;padding:8px 16px 4px;border-bottom:1px solid #2E5085}.dp-middle{flex:1;background:#BCC3C8}.dp-sidebar{width:160px;background:#BCC3C8;border-left:1px solid #2E5085;display:flex;flex-direction:column;padding:4px;gap:4px}.sb-btn{background:#F8F9FA;border:1px solid #2E5085;color:#172026;font-family:'Geist',sans-serif;font-size:11px;text-align:left;padding:4px 8px;cursor:pointer;display:flex;text-decoration:none}.sb-key{font-family:'JetBrains Mono',monospace;font-weight:700;color:#2E5085;width:32px}.sb-btn:hover{background:#F5B935}.sb-btn.disabled{color:#BCC3C8;cursor:default}.sb-btn.disabled .sb-key{color:#BCC3C8}.sb-btn.disabled:hover{background:#F8F9FA}.dp-footer{background:#F8F9FA;border-top:1px solid #2E5085;display:flex;align-items:center;padding:2px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;gap:24px;height:24px}.dp-footer a{color:#172026;text-decoration:none}.dp-footer .fk{color:#2E5085;font-weight:700}.dp-action-btn{background:#2E5085;color:#F8F9FA;border:1px solid #172026;padding:4px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;margin-top:8px}.dp-action-btn:hover{background:#F5B935;color:#172026}.dp-status{padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;border-top:1px solid #2E5085;color:#2E5085}
</style>
<div class="dp-wrapper">
    <div class="dp-header"><span>Data Path Configuration</span><a href="javascript:history.go(-1);" class="close-btn">&times;</a></div>
    <div class="dp-body">
        <div class="dp-main">
            <div class="dp-section-title">DATA STORAGE LOCATION</div>
            <div class="dp-form">
                <div class="dp-row"><div class="dp-label">Current Data Path</div><div class="dp-colon">:</div>
                    <input type="text" class="dp-input" id="dpPath" value="{{ data_path }}"></div>
                <button class="dp-action-btn" onclick="dpSave()">Update Data Path</button>
            </div>
            <div class="dp-status" id="dpSt">&#9679; Current data path loaded from settings</div>
        </div>
        <div class="dp-middle"></div>
        <div class="dp-sidebar">
            <a href="javascript:history.go(-1);" class="sb-btn"><span class="sb-key">Esc</span><span>Back</span></a>
            <div class="sb-btn disabled"><span class="sb-key">F2</span></div><div class="sb-btn disabled"><span class="sb-key">F3</span></div><div class="sb-btn disabled"><span class="sb-key">F4</span></div><div class="sb-btn disabled"><span class="sb-key">F5</span></div><div class="sb-btn disabled"><span class="sb-key">F6</span></div><div class="sb-btn disabled"><span class="sb-key">F7</span></div><div class="sb-btn disabled"><span class="sb-key">F8</span></div><div class="sb-btn disabled"><span class="sb-key">F9</span></div><div class="sb-btn disabled"><span class="sb-key">F10</span></div>
            <div style="flex:1;"></div>
            <div class="sb-btn" onclick="dpSave()"><span class="sb-key">S</span><span>Save</span></div>
        </div>
    </div>
    <div class="dp-footer"><a href="javascript:history.go(-1);"><span class="fk">Q:</span> Quit</a><a href="/home"><span class="fk">Esc:</span> Dashboard</a></div>
</div>
<script>
function dpSave(){
    var fd=new FormData();fd.append('data_path',document.getElementById('dpPath').value);
    fetch('/feature/data-path',{method:'POST',body:fd,headers:{'X-CSRFToken':'{{ csrf_token }}'}}).then(function(r){return r.json();}).then(function(d){document.getElementById('dpSt').innerHTML='&#9679; '+d.message;});
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')history.go(-1);});
</script>
{% endblock %}
